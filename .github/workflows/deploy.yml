name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLY_API_TOKEN: "FlyV1 fm2_lJPETgr15akNAF1mO6c7Q9y7w3GtPO2iZkHD6knueC4739VZ6BXpnTeCj68RC89XS7JvAcyM9CgqThrKXx4IC88IURDlDfZy/Qeeo5Qm7g6x3sQQkP3j1afAdJ+eEQijGixvqsO5aHR0cHM6Ly9hcGkuZmx5LmlvL2FhYS92MZgEks5qLc5rzo/F1IkXzgAXneEKkc4AF53hDMQQqd9f5GjYZs2SBUeODtwttcQg1hPuoq1RGrZO6r0oKG/z5DAi2cRVYXoMhldjYFZplRY="

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "/home/runner/.fly/bin" >> $GITHUB_PATH

      - name: Deploy via flyctl
        run: |
          echo "Attempting flyctl deploy..." 
          /home/runner/.fly/bin/flyctl deploy -a gobi-replica --config fly.toml --strategy immediate 2>&1 && echo "FLYCTL_SUCCESS=true" >> $GITHUB_ENV || echo "FLYCTL_SUCCESS=false" >> $GITHUB_ENV

      - name: Fallback - Direct GraphQL deployImage mutation
        if: env.FLYCTL_SUCCESS == 'false'
        run: |
          curl -s -X POST "https://api.fly.io/graphql" \
            -H "Authorization: Bearer $FLY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { deployImage(input: {appId: \"gobi-replica\", strategy: IMMEDIATE}) { release { id version } } }"}' 2>&1

