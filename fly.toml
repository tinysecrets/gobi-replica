# fly.toml app configuration file generated for gobi-replica on 2026-06-13T17:46:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gobi-replica'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]

[env]
  AGENT_NAME = 'Patrick'
  AGENT_ROLE = 'Autonomous AI Agent'
  DATA_DIR = '/data'
  LLM_MODEL = 'meta-llama/llama-3.2-3b-instruct:free'
  LLM_PROVIDERS = 'openrouter,ollama,openai'
  MEMORY_MAX_TURNS = '50'
  MEMORY_SEMANTIC_THRESHOLD = '0.7'
  MEMORY_SUMMARIZE_AFTER = '20'
  NODE_ENV = 'production'
  OLLAMA_BASE_URL = 'http://localhost:11434/v1'
  OLLAMA_MODEL = 'llama3.2:3b'
  OPENROUTER_APP_TITLE = 'Gobi Replica'
  OPENROUTER_HTTP_REFERER = 'https://github.com/gobi-replica'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['app']
